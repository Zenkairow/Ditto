<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ditto</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-primary: #3b82f6;
            --accent-hover: #60a5fa;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success-color: #10b981;
        }

        body {
            width: 320px;
            margin: 0;
            padding: 20px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: var(--text-primary);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0 0 8px 0;
            font-weight: 600;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin: 0 0 20px 0;
            line-height: 1.4;
        }

        button {
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        button.success {
            background: var(--success-color);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .loader {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .btn-text {
            transition: opacity 0.2s;
        }
        
        .loading .btn-text {
            opacity: 0;
        }
        
        .loading .loader {
            display: block;
        }

        #status {
            margin-top: 16px;
            font-size: 0.8rem;
            height: 1rem;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ditto</h1>
        <p>Duplicate your AI's brain across sessions.</p>
        <button id="syncBtn">
            <span class="btn-text">Sync Active Chat</span>
            <div class="loader"></div>
        </button>
        <button id="dashboardBtn" style="margin-top: 10px; background: rgba(255, 255, 255, 0.1); color: var(--text-primary); box-shadow: none;">
            <span class="btn-text">Open Dashboard</span>
        </button>
        <div id="status"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
